# LiveWall — standalone pyproject.toml
# Rename to pyproject.toml when extracting livewall to its own repository.

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "livewall"
version = "0.1.0"
description = "Video wallpaper engine for KDE Plasma / X11"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "python-mpv>=1.0",
    "python-xlib>=0.33",
    "PyQt6>=6.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "ruff>=0.4",
    "mypy>=1.8",
]

[project.scripts]
livewall = "livewall.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["livewall*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
mypy_path = "src"
